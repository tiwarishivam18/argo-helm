apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-helm-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tiwarishivam18/argo-helm.git
    targetRevision: main
    path: gitops/helm/argo-helm
    helm:
      valueFiles:
        - values.yaml
  destination: https://kubernetes.default.svc
    server: 
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true