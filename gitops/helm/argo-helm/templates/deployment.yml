apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argo-helm.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "argo-helm.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "argo-helm.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "argo-helm.name" . }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}