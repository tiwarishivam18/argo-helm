name : argo-helm

on:
  push:
    branches:
      - dev       # for dev branch
  pull_request:
    types: [closed]
    branches:
      - main        # for main branch

env:
  APP_NAME: argo-helm
  REGISTRY: docker.io
  REGISTRY_REPO: tiwarishivam/argo-helm


jobs:

  build:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: checkout code
        uses: actions/checkout@v3     # uses is is an official reusable action that tells GitHub Actions to run a pre-built action instead of writing commands manually. fetch full history for all branches and tags
        with:
          fetch-depth: 0


      - name: set image tag
        id: set_image_tag    #Assigns a unique identifier to this step, Allows other steps to reference outputs from this step
        run: |
          if [ "${{ github.event_name }}" = pull_request ]; then
            TAG="PR-${{ github.event.pull_request.number }}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: loginto docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build and push docker image
        run: |
          docker build -t ${{ env.REGISTRY_REPO }}:${{ steps.set_image_tag.outputs.tag }} ./app
          docker push ${{ env.REGISTRY_REPO }}:${{ steps.set_image_tag.outputs.tag }}